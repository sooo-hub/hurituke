<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#08082a"/>
      <stop offset="100%" stop-color="#1a0a3a"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1e12"/>
      <stop offset="100%" stop-color="#0e0906"/>
    </linearGradient>
    <radialGradient id="spot1" cx="25%" cy="0%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffe8c0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffe8c0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spot2" cx="75%" cy="0%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#c0d0ff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#c0d0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spot3" cx="50%" cy="0%" r="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffd0f0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffd0f0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="640" height="480" fill="url(#sky)"/>

  <!-- スポットライト -->
  <rect width="640" height="320" fill="url(#spot1)"/>
  <rect width="640" height="320" fill="url(#spot2)"/>
  <rect width="640" height="320" fill="url(#spot3)"/>

  <!-- 幕 (左) -->
  <rect x="0" y="0" width="60" height="320" fill="#1a0a0a" opacity="0.7"/>
  <!-- 幕 (右) -->
  <rect x="580" y="0" width="60" height="320" fill="#1a0a0a" opacity="0.7"/>

  <!-- ステージ床 -->
  <rect x="0" y="310" width="640" height="170" fill="url(#floor)"/>

  <!-- 床の奥行き線 (消失点 = 320, 310) -->
  <line x1="320" y1="310" x2="0"   y2="480" stroke="#5a4030" stroke-width="1" opacity="0.6"/>
  <line x1="320" y1="310" x2="107" y2="480" stroke="#5a4030" stroke-width="1" opacity="0.5"/>
  <line x1="320" y1="310" x2="213" y2="480" stroke="#5a4030" stroke-width="1" opacity="0.4"/>
  <line x1="320" y1="310" x2="320" y2="480" stroke="#5a4030" stroke-width="1" opacity="0.6"/>
  <line x1="320" y1="310" x2="427" y2="480" stroke="#5a4030" stroke-width="1" opacity="0.4"/>
  <line x1="320" y1="310" x2="533" y2="480" stroke="#5a4030" stroke-width="1" opacity="0.5"/>
  <line x1="320" y1="310" x2="640" y2="480" stroke="#5a4030" stroke-width="1" opacity="0.6"/>

  <!-- ステージ前縁 -->
  <line x1="0" y1="310" x2="640" y2="310" stroke="#c8a870" stroke-width="2.5"/>
  <line x1="0" y1="312" x2="640" y2="312" stroke="#c8a870" stroke-width="0.5" opacity="0.4"/>

  <!-- ステージ文字 -->
  <text x="320" y="294" text-anchor="middle" fill="#c8a870"
        font-size="13" font-family="Georgia, serif" letter-spacing="6" opacity="0.7">STAGE</text>

  <!-- 上部装飾ライン -->
  <line x1="60" y1="8"  x2="580" y2="8"  stroke="#4040a0" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="12" x2="580" y2="12" stroke="#8080ff" stroke-width="0.5" opacity="0.3"/>
</svg>
